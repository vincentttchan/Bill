<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>歷史大挑戰 - 跨級別終極版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --text-primary: #0F172A;
        --text-secondary: #475569;
        --text-tertiary: #94A3B8;
        --brand-color: #4F46E5;
        --brand-light: rgba(99, 102, 241, 0.1);
        --glass-bg: rgba(255, 255, 255, 0.65);
        --glass-border: rgba(255, 255, 255, 0.8);
        --glass-element: rgba(255, 255, 255, 0.6);
        --glass-hover: rgba(255, 255, 255, 0.95);
        --status-suspense: #F59E0B; 
        --status-correct: #10B981; 
        --status-wrong: #EF4444; 
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    body {
        margin: 0; padding: 0; font-family: 'Noto Sans TC', sans-serif;
        color: var(--text-primary); display: flex; justify-content: center;
        align-items: center; min-height: 100dvh; background-color: #F8FAFC;
        overflow-x: hidden; position: relative;
    }

    .bg-shapes {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: -1; overflow: hidden; background: #F8FAFC;
    }

    .shape-1, .shape-2, .shape-3 {
        position: absolute; border-radius: 50%; filter: blur(90px);
        opacity: 0.6; animation: float 20s infinite ease-in-out alternate; will-change: transform;
    }

    .shape-1 { width: 50vw; height: 50vw; min-width: 300px; min-height: 300px; background: #BAE6FD; top: -10%; left: -10%; animation-delay: 0s; }
    .shape-2 { width: 40vw; height: 40vw; min-width: 250px; min-height: 250px; background: #DDD6FE; bottom: -10%; right: -10%; animation-delay: -5s; }
    .shape-3 { width: 30vw; height: 30vw; min-width: 200px; min-height: 200px; background: #FECACA; top: 40%; left: 60%; animation-delay: -10s; }

    @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(5%, 5%) scale(1.05); }
        100% { transform: translate(-5%, -5%) scale(0.95); }
    }

    .app-container { width: 100%; max-width: 900px; padding: 2rem; z-index: 1; }
    .font-num { font-family: 'Outfit', sans-serif; }

    .glass-card {
        background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border); border-radius: 24px;
        box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08), 0 0 15px rgba(255,255,255,0.5) inset;
        padding: 3rem; position: relative; width: 100%;
    }

    .level-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2rem; }
    
    .level-card {
        background: rgba(255, 255, 255, 0.7); border: 2px solid transparent; border-radius: 20px;
        padding: 2rem 1.5rem; text-align: center; cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }
    
    .level-card.dse-card {
        grid-column: 1 / -1; 
        background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(238,242,255,0.9));
        border-color: #C7D2FE;
    }

    @media (hover: hover) {
        .level-card:hover {
            transform: translateY(-5px); background: rgba(255, 255, 255, 0.95);
            border-color: #818CF8; box-shadow: 0 20px 30px -10px rgba(79, 70, 229, 0.15);
        }
        .level-card.dse-card:hover { border-color: #4F46E5; }
    }
    .level-card:active { transform: scale(0.98); }

    .level-icon {
        display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px;
        background: #EEF2FF; border-radius: 16px; margin-bottom: 1.2rem; color: #4F46E5;
    }

    .level-card h2 { font-size: 1.4rem; margin: 0 0 0.5rem 0; color: #1E293B; }
    .level-card p { color: var(--text-secondary); font-size: 1rem; margin: 0; line-height: 1.5; }

    .header-section { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; }
    .title-group h1 { font-size: 2rem; font-weight: 700; margin: 0 0 0.5rem 0; color: #1E293B; }
    .title-group p { font-size: 1.1rem; color: var(--text-secondary); margin: 0; }

    .progress-wrapper { margin-bottom: 2.5rem; }
    .progress-text { display: flex; justify-content: space-between; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.5rem; font-weight: 600; }
    .progress-bar { height: 8px; background: rgba(0, 0, 0, 0.05); border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #60A5FA, #6366F1); border-radius: 99px; width: 0%; transition: width 0.5s ease; }

    .info-bar {
        display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.5);
        padding: 1rem 1.5rem; border-radius: 16px; margin-bottom: 2rem; border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .prize-display { display: flex; gap: 2rem; }
    .prize-item { display: flex; flex-direction: column; }
    .prize-label { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 0.25rem; font-weight: 700; }
    .prize-value { font-size: 1.5rem; font-weight: 700; color: #4F46E5; line-height: 1; }
    .prize-value.safe { color: var(--text-secondary); font-size: 1.25rem; }

    .lifelines { display: flex; gap: 0.5rem; }
    .btn-lifeline {
        display: flex; align-items: center; gap: 0.4rem; background: var(--glass-element);
        border: 1px solid var(--glass-border); padding: 0.5rem 0.8rem; border-radius: 12px;
        font-weight: 600; color: var(--text-primary); cursor: pointer; transition: all 0.2s ease; font-size: 0.95rem;
    }
    .btn-lifeline svg { width: 18px; height: 18px; stroke: var(--brand-color); flex-shrink: 0; }
    @media (hover: hover) { .btn-lifeline:hover:not(:disabled) { background: var(--glass-hover); transform: translateY(-1px); } }
    .btn-lifeline:disabled { opacity: 0.4; cursor: not-allowed; background: rgba(255,255,255,0.3); transform: none; }

    .question-wrapper { margin-bottom: 2rem; }
    .question-badge {
        display: inline-block; background: #EEF2FF; color: #4F46E5; border: 1px solid #C7D2FE;
        padding: 0.35rem 0.85rem; border-radius: 8px; font-size: 0.875rem; font-weight: 700; margin-bottom: 1rem;
    }
    .question-text { font-size: 1.35rem; font-weight: 600; line-height: 1.6; color: var(--text-primary); margin: 0; }

    .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .btn-option {
        display: flex; align-items: center; width: 100%; background: var(--glass-element);
        border: 1px solid var(--glass-border); padding: 1.25rem 1.5rem; border-radius: 16px;
        font-size: 1.05rem; font-weight: 500; color: var(--text-primary); cursor: pointer;
        transition: all 0.25s ease; text-align: left; line-height: 1.5; font-family: inherit;
    }
    @media (hover: hover) {
        .btn-option:hover:not(:disabled) { background: var(--glass-hover); border-color: #CBD5E1; transform: translateY(-2px); }
        .btn-option:hover:not(:disabled) .option-letter { background: var(--brand-color); border-color: var(--brand-color); color: white; }
    }
    .btn-option:active { transform: scale(0.98); }
    
    .option-letter {
        display: flex; align-items: center; justify-content: center; width: 32px; height: 32px;
        background: #F1F5F9; color: var(--text-secondary); border: 1px solid #E2E8F0;
        border-radius: 10px; font-weight: 700; margin-right: 1rem; flex-shrink: 0; transition: all 0.2s ease;
    }

    /* 短答題 SA 專用 UI */
    .sa-container { display: none; flex-direction: column; align-items: center; padding: 2rem 0; }
    .sa-container.show { display: flex; animation: fadeIn 0.5s ease; }
    .sa-prompt { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 1.5rem; text-align: center; }
    
    .sa-grading-box {
        width: 100%; background: rgba(255,255,255,0.9); border: 1px solid #C7D2FE; border-radius: 16px;
        padding: 1.5rem; display: none; margin-bottom: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
    }
    .sa-grading-box.show { display: block; animation: slideUp 0.4s ease; }
    .sa-grading-title { color: #4F46E5; font-weight: 700; margin-bottom: 1rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    .sa-grading-points { margin: 0; padding-left: 1.5rem; line-height: 1.8; color: #1E293B; }
    .sa-eval-buttons { display: flex; gap: 1rem; width: 100%; }

    .option-suspense { border-color: #F59E0B; background: #FEF3C7; color: #B45309; animation: breath 1.5s infinite alternate; }
    .option-suspense .option-letter { background: #F59E0B; border-color: #F59E0B; color: white; }
    @keyframes breath { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.3); } 100% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } }

    .option-correct { border-color: var(--status-correct) !important; background: #ECFDF5 !important; color: #065F46 !important; transform: none !important; }
    .option-correct .option-letter { background: var(--status-correct) !important; border-color: var(--status-correct) !important; color: white !important; }

    .option-wrong { border-color: var(--status-wrong) !important; background: #FEF2F2 !important; color: #991B1B !important; transform: none !important; }
    .option-wrong .option-letter { background: var(--status-wrong) !important; border-color: var(--status-wrong) !important; color: white !important; }

    .message-panel {
        margin-top: 2rem; background: rgba(255, 255, 255, 0.95); border: 1px solid var(--glass-border);
        border-radius: 16px; display: none; flex-direction: column; overflow: hidden;
        animation: slideUp 0.4s ease forwards; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }
    .message-panel.show { display: flex; }
    .msg-content { padding: 1.5rem; font-size: 1.05rem; line-height: 1.6; }
    .msg-action { padding: 1rem 1.5rem; background: rgba(248, 250, 252, 0.8); border-top: 1px solid #E2E8F0; display: flex; justify-content: flex-end; }
    
    .msg-hint .msg-content { background: #EEF2FF; border-left: 4px solid var(--brand-color); }
    .msg-correct .msg-content { background: #ECFDF5; border-left: 4px solid var(--status-correct); }
    .msg-wrong .msg-content { background: #FEF2F2; border-left: 4px solid var(--status-wrong); }

    .btn-next, .btn-primary, .btn-secondary, .btn-reveal {
        border: none; font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-family: inherit;
        display: inline-flex; justify-content: center; align-items: center; text-align: center;
    }
    .btn-next { background: linear-gradient(135deg, #6366F1, #4F46E5); color: white; padding: 0.7rem 1.8rem; font-size: 1.05rem; }
    .btn-primary { background: linear-gradient(135deg, #3B82F6, #6366F1); color: white; padding: 1rem 2.5rem; font-size: 1.15rem; border-radius: 99px; width: 100%; max-width: 300px;}
    .btn-secondary { background: white; color: #4F46E5; border: 2px solid #E0E7FF; padding: 0.6rem 1.2rem; font-size: 1rem; margin-bottom: 1.5rem;}
    .btn-reveal { background: #EEF2FF; color: #4F46E5; border: 2px solid #C7D2FE; padding: 1rem 2rem; font-size: 1.1rem; border-radius: 16px; width: 100%; }
    
    .btn-eval-pass { background: #ECFDF5; color: #059669; border: 2px solid #34D399; flex: 1; padding: 0.8rem; font-size: 1.05rem; }
    .btn-eval-fail { background: #FEF2F2; color: #DC2626; border: 2px solid #F87171; flex: 1; padding: 0.8rem; font-size: 1.05rem; }

    @media (hover: hover) { 
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(79, 70, 229, 0.4); } 
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
        .btn-secondary:hover { background: #EEF2FF; border-color: #C7D2FE; }
        .btn-reveal:hover { background: #E0E7FF; transform: translateY(-2px); }
        .btn-eval-pass:hover { background: #D1FAE5; transform: translateY(-2px); }
        .btn-eval-fail:hover { background: #FEE2E2; transform: translateY(-2px); }
    }

    .screen { display: none; animation: fadeIn 0.5s ease-out forwards; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .start-content { text-align: center; padding: 1rem 0; }
    .start-content h1 { font-size: 2.5rem; font-weight: 700; margin: 0 0 1rem 0; color: #1E293B; line-height: 1.2; }
    .start-content p { font-size: 1.15rem; line-height: 1.7; color: var(--text-secondary); margin-bottom: 2rem; }

    .rules-box {
        background: rgba(255, 255, 255, 0.5); padding: 1.5rem; border-radius: 16px; text-align: left;
        max-width: 500px; margin: 0 auto 3rem auto; border: 1px solid var(--glass-border);
    }
    .rules-box ul { margin: 0; padding-left: 1.5rem; line-height: 1.8; }
    .rules-box li strong { color: #4F46E5; }

    .bar-fill { transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

    @media (max-width: 768px) {
        .app-container { padding: 1rem; }
        .glass-card { padding: 1.5rem; border-radius: 20px; }
        .start-content h1 { font-size: 2rem; }
        .level-grid { grid-template-columns: 1fr; gap: 1rem; }
        .level-card { padding: 1.5rem; }
        .level-icon { width: 56px; height: 56px; margin-bottom: 1rem; }
        .title-group h1 { font-size: 1.6rem; }
        .info-bar { flex-direction: column; gap: 1.25rem; align-items: stretch; padding: 1.25rem 1rem; }
        .prize-display { justify-content: space-around; }
        .lifelines { justify-content: space-between; gap: 0.5rem; }
        .btn-lifeline { flex: 1; flex-direction: column; justify-content: center; padding: 0.6rem 0.2rem; gap: 0.4rem; font-size: 0.8rem; }
        .options-grid { grid-template-columns: 1fr; gap: 0.75rem; }
        .sa-eval-buttons { flex-direction: column; }
    }
</style>
</head>
<body>

<div class="bg-shapes"><div class="shape-1"></div><div class="shape-2"></div><div class="shape-3"></div></div>

<div class="app-container">
    <div class="glass-card">
        
        <!-- 首頁：級別選擇 -->
        <div id="screen-select" class="screen active">
            <div class="start-content">
                <h1>歷史大挑戰</h1>
                <p>請選擇你要挑戰的歷史時代與級別</p>
                
                <div class="level-grid">
                    <div class="level-card" onclick="selectLevel('S1')">
                        <div class="level-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg></div>
                        <h2>中一級：兩漢歷史</h2>
                        <p>漢初無為至武帝施政</p>
                    </div>
                    <div class="level-card" onclick="selectLevel('S2')">
                        <div class="level-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                        <h2>中二級：近代中國</h2>
                        <p>滿清入關及民族政策</p>
                    </div>
                    <!-- 高中 DSE 選項 -->
                    <div class="level-card dse-card" onclick="selectLevel('DSE')">
                        <div class="level-icon" style="background: #4F46E5; color: white; width: 72px; height: 72px;"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg></div>
                        <h2 style="color: #4F46E5; font-size: 1.6rem;">高中 DSE：對外關係</h2>
                        <p style="color: #1E293B; font-weight: 500;">混合題型：15 題 MC + 5 題短答評估</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 規則與開始畫面 -->
        <div id="screen-start" class="screen">
            <button class="btn-secondary" onclick="switchScreen('screen-select')">← 返回選擇級別</button>
            <div class="start-content">
                <h1 id="start-title">載入中...</h1>
                <p id="start-desc">載入中...</p>
                <div class="rules-box" id="rules-box-content"></div>
                <button class="btn-primary" onclick="startGame()">接受挑戰</button>
            </div>
        </div>

        <!-- 遊戲畫面 -->
        <div id="screen-quiz" class="screen">
            <div class="header-section">
                <div class="title-group">
                    <h1>歷史大挑戰</h1>
                    <p id="quiz-subtitle">載入中...</p>
                </div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-text">
                    <span>挑戰進度</span>
                    <span class="font-num"><span id="current-q-num">1</span> / <span id="total-q-num">20</span></span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>

            <div class="info-bar">
                <div class="prize-display">
                    <div class="prize-item"><span class="prize-label">當前分數/獎金</span><span class="prize-value font-num" id="current-prize">0</span></div>
                    <div class="prize-item"><span class="prize-label">保證底線</span><span class="prize-value safe font-num" id="safe-prize">0</span></div>
                </div>
                <div class="lifelines">
                    <button id="btn-5050" class="btn-lifeline" onclick="use5050()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.2 7.8l-7.7 7.7-4-4-5.7 5.7"/><path d="M15 7h6v6"/></svg><span>50:50</span></button>
                    <button id="btn-audience" class="btn-lifeline" onclick="useAudience()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg><span>觀眾</span></button>
                    <button id="btn-hint" class="btn-lifeline" onclick="useHint()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>提示</span></button>
                </div>
            </div>

            <div class="question-wrapper">
                <div id="q-badge" class="question-badge">Question 1</div>
                <h2 id="question-text" class="question-text">載入題目中...</h2>
            </div>

            <!-- MC 選項區 -->
            <div class="options-grid" id="options-container"></div>
            
            <!-- 短答題自我評估區 -->
            <div class="sa-container" id="sa-container">
                <p class="sa-prompt">💭 這是一道概念短答題。請在腦海中或紙上構思你的答案（要點），準備好後點擊下方按鈕查看評分參考。</p>
                <button class="btn-reveal" id="btn-reveal-sa" onclick="revealSA()">顯示評分參考 (Marking Scheme)</button>
                
                <div class="sa-grading-box" id="sa-grading-box">

    const allQuestions = {
        'S1': s1Questions, 
        'S2': s2Questions, 
        'DSE': dseQuestions
    };

    let activeQuestions = [];
    let currentLevel = '';
    let currentQIndex = 0;
    let currentSafePrize = "0";
    let isWaiting = false;
    let currentShuffledOptions = []; 
    
    let used5050 = false;
    let usedAudience = false;
    let usedHint = false;

    const labels = ["A", "B", "C", "D"];

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function selectLevel(level) {
        currentLevel = level;
        activeQuestions = allQuestions[level];
        
        const titleEl = document.getElementById('start-title');
        const descEl = document.getElementById('start-desc');
        const subtitleEl = document.getElementById('quiz-subtitle');
        const rulesBox = document.getElementById('rules-box-content');
        
        if (level === 'DSE') {
            titleEl.innerText = "高中 DSE：共和國對外關係";
            descEl.innerHTML = "從「一邊倒」到「改革開放」<br>考驗你的時空觀念與歷史分析能力！";
            subtitleEl.innerText = "建國至二十世紀末外交";
            rulesBox.innerHTML = `
                <ul>
                    <li>本題庫專為 <strong>DSE 高中生</strong> 設計，著重歷史概念與分析。</li>
                    <li>共 <strong>${activeQuestions.length} 題</strong>：包含 15 題 MC 及 <strong>5 題短答概念自我評估題</strong>。</li>
                    <li>短答題請先自行構思要點，再透過 <strong>DSE 評分參考 (Marking Scheme)</strong> 進行自主對卷。</li>
                    <li>附設 50:50、觀眾投票及提示錦囊（短答題不適用）。</li>
                </ul>
            `;
        } else {
            let lvlText = level === 'S1' ? "中一級：兩漢歷史" : "中二級：近代中國";
            titleEl.innerText = lvlText;
            descEl.innerHTML = "考驗你的歷史邏輯與朝代興衰推演能力！";
            subtitleEl.innerText = "基礎鞏固訓練";
            rulesBox.innerHTML = `
                <ul>
                    <li>共 <strong>${activeQuestions.length} 題</strong> 選擇題，從測驗重點範圍中精選。</li>
                    <li>設有保險線，答錯若超過保險線仍可獲得底部分數。</li>
                    <li>附設三大求救錦囊：50:50、觀眾投票、溫習提示。</li>
                </ul>
            `;
        }
        switchScreen('screen-start');
    }

    function startGame() {
        currentQIndex = 0;
        currentSafePrize = "0";
        used5050 = false; usedAudience = false; usedHint = false;
        isWaiting = false;

        document.getElementById('btn-5050').disabled = false;
        document.getElementById('btn-audience').disabled = false;
        document.getElementById('btn-hint').disabled = false;
        
        // 更新總題數顯示
        document.getElementById('total-q-num').innerText = activeQuestions.length;

        switchScreen('screen-quiz');
        loadQuestion();
    }

    function loadQuestion() {
        isWaiting = false;
        const qData = activeQuestions[currentQIndex];
        
        document.getElementById('current-q-num').innerText = currentQIndex + 1;
        document.getElementById('progress-fill').style.width = `${((currentQIndex) / activeQuestions.length) * 100}%`;
        document.getElementById('current-prize').innerText = qData.prize;
        document.getElementById('safe-prize').innerText = currentSafePrize;
        
        const badge = document.getElementById('q-badge');
        if (qData.type === 'SA') {
            badge.innerHTML = `✍️ 概念短答題`;
            badge.style.background = '#F3E8FF'; badge.style.color = '#7E22CE'; badge.style.borderColor = '#E9D5FF';
        } else if (qData.safe) {
            badge.innerHTML = `🔒 保險線題目`;
            badge.style.background = '#FEF3C7'; badge.style.color = '#D97706'; badge.style.borderColor = '#FDE68A';
        } else {
            badge.innerHTML = `Question ${currentQIndex + 1}`;
            badge.style.background = '#EEF2FF'; badge.style.color = '#4F46E5'; badge.style.borderColor = '#C7D2FE';
        }

        document.getElementById('question-text').innerText = qData.q;
        
        // 重置 UI
        const msgPanel = document.getElementById('message-panel');
        msgPanel.className = 'message-panel'; msgPanel.innerHTML = '';
        
        const optionsContainer = document.getElementById('options-container');
        const saContainer = document.getElementById('sa-container');
        
        if (qData.type === 'SA') {
            // 短答題模式
            optionsContainer.style.display = 'none';
            saContainer.classList.add('show');
            document.getElementById('btn-reveal-sa').style.display = 'block';
            document.getElementById('sa-grading-box').classList.remove('show');
            
            // 停用 MC 專用錦囊
            document.getElementById('btn-5050').disabled = true;
            document.getElementById('btn-audience').disabled = true;
        } else {
            // MC 題模式
            optionsContainer.style.display = 'grid';
            saContainer.classList.remove('show');
            
            // 恢復錦囊狀態
            if(!used5050) document.getElementById('btn-5050').disabled = false;
            if(!usedAudience) document.getElementById('btn-audience').disabled = false;

            currentShuffledOptions = qData.options.map((opt, idx) => ({
                text: opt, isCorrect: idx === qData.ans, originalIndex: idx
            }));

            for (let i = currentShuffledOptions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentShuffledOptions[i], currentShuffledOptions[j]] = [currentShuffledOptions[j], currentShuffledOptions[i]];
            }
            
            optionsContainer.innerHTML = "";
            currentShuffledOptions.forEach((optData, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option';
                btn.innerHTML = `<span class="option-letter font-num">${labels[index]}</span> <span>${optData.text}</span>`;
                btn.onclick = () => selectAnswer(index, btn);
                btn.id = 'opt-btn-' + index;
                optionsContainer.appendChild(btn);
            });
        }
    }

    // --- 短答題 SA 邏輯 ---
    function revealSA() {
        document.getElementById('btn-reveal-sa').style.display = 'none';
        const qData = activeQuestions[currentQIndex];
        const ptsContainer = document.getElementById('sa-grading-points');
        
        ptsContainer.innerHTML = '';
        qData.keywords.forEach(kw => {
            ptsContainer.innerHTML += `<li>${kw}</li>`;
        });
        document.getElementById('sa-info').innerText = qData.info;
        
        document.getElementById('sa-grading-box').classList.add('show');
        setTimeout(() => document.getElementById('sa-grading-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function evalSA(isPass) {
        if (isWaiting) return;
        isWaiting = true;
        
        const qData = activeQuestions[currentQIndex];
        const msgPanel = document.getElementById('message-panel');
        document.getElementById('sa-grading-box').style.pointerEvents = 'none'; // 防連點

        if (isPass) {
            if (qData.safe) currentSafePrize = qData.prize;
            document.getElementById('progress-fill').style.width = `${((currentQIndex + 1) / activeQuestions.length) * 100}%`;
            const btnText = currentQIndex < activeQuestions.length - 1 ? "下一題 ➔" : "完成挑戰 🏆";
            
            msgPanel.innerHTML = `
                <div class="msg-content"><strong>✅ 評估結果：掌握要點！</strong><br>做得好！歷史論述需要嚴謹的邏輯，請繼續保持。</div>
                <div class="msg-action"><button class="btn-next" onclick="proceedNext()">${btnText}</button></div>
            `;
            msgPanel.className = 'message-panel show msg-correct';
        } else {
            msgPanel.innerHTML = `
                <div class="msg-content"><strong>❌ 評估結果：仍需努力。</strong><br>別灰心，短答題需要反覆溫習概念，請多看幾次上方的詳細解說。</div>
                <div class="msg-action"><button class="btn-next" style="background: linear-gradient(135deg, #EF4444, #DC2626);" onclick="endGame(false)">查看總結</button></div>
            `;
            msgPanel.className = 'message-panel show msg-wrong';
        }
        setTimeout(() => msgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
    }

    // --- MC 錦囊邏輯 ---
    function use5050() {
        if (used5050 || isWaiting || activeQuestions[currentQIndex].type === 'SA') return;
        used5050 = true; document.getElementById('btn-5050').disabled = true;

        let wrongIndices = [];
        currentShuffledOptions.forEach((opt, idx) => { if (!opt.isCorrect) wrongIndices.push(idx); });
        wrongIndices.sort(() => Math.random() - 0.5);
        const toHide = wrongIndices.slice(0, 2);

        toHide.forEach(idx => {
            const btn = document.getElementById('opt-btn-' + idx);
            if (btn) { btn.style.opacity = '0.15'; btn.style.pointerEvents = 'none'; btn.style.filter = 'grayscale(100%)'; btn.dataset.eliminated = "true"; }
        });
    }

    function useAudience() {
        if (usedAudience || isWaiting || activeQuestions[currentQIndex].type === 'SA') return;
        usedAudience = true; document.getElementById('btn-audience').disabled = true;

        const correctIndex = currentShuffledOptions.findIndex(opt => opt.isCorrect);
        let activeIndices = [];
        for (let i = 0; i < 4; i++) {
            const btn = document.getElementById('opt-btn-' + i);
            if (btn && btn.dataset.eliminated !== "true") activeIndices.push(i);
        }

        let percentages = [0, 0, 0, 0]; let remaining = 100;
        let correctPct = Math.floor(Math.random() * 31) + 45;
        if (activeIndices.length === 2) correctPct = Math.floor(Math.random() * 21) + 65;

        if (correctPct > remaining) correctPct = remaining;
        percentages[correctIndex] = correctPct; remaining -= correctPct;

        let otherActive = activeIndices.filter(i => i !== correctIndex);
        for (let i = 0; i < otherActive.length; i++) {
            let idx = otherActive[i];
            if (i === otherActive.length - 1) { percentages[idx] = remaining; } 
            else { let pct = Math.floor(Math.random() * (remaining + 1)); percentages[idx] = pct; remaining -= pct; }
        }

        let chartHTML = '<div style="margin-top: 15px; display: flex; flex-direction: column; gap: 10px;">';
        for (let i = 0; i < 4; i++) {
            const isActive = activeIndices.includes(i);
            const opacity = isActive ? '1' : '0.3';
            chartHTML += `
                <div style="display: flex; align-items: center; opacity: ${opacity};">
                    <span class="font-num" style="width: 28px; font-weight: 700;">${labels[i]}</span>
                    <div style="flex-grow: 1; height: 12px; background: rgba(0,0,0,0.06); border-radius: 99px; overflow: hidden; margin-right: 12px;">
                        <div class="bar-fill" style="height: 100%; width: 0%; background: linear-gradient(90deg, #60A5FA, #4F46E5); border-radius: 99px;" data-target="${percentages[i]}"></div>
                    </div>
                    <span class="font-num" style="width: 45px; text-align: right; font-weight: 600; color: #4F46E5;">${percentages[i]}%</span>
                </div>
            `;
        }
        chartHTML += '</div>';

        const msgPanel = document.getElementById('message-panel');
        msgPanel.innerHTML = `<div class="msg-content"><strong>👥 現場觀眾投票結果：</strong><br><span style="font-size: 0.9em; color: var(--text-secondary);">（供您參考！）</span>${chartHTML}</div>`;
        msgPanel.className = 'message-panel show msg-hint';

        setTimeout(() => {
            document.querySelectorAll('.bar-fill').forEach(bar => { bar.style.width = bar.getAttribute('data-target') + '%'; });
            msgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
    }

    function useHint() {
        if (usedHint || isWaiting) return;
        usedHint = true; document.getElementById('btn-hint').disabled = true;
        const qData = activeQuestions[currentQIndex];
        
        // 對於短答題，提示功能給予思考方向
        let hintText = qData.type === 'SA' ? "💡 提示：請回憶相關年代的國際冷戰格局或國內政策方針。" : `💡 溫習筆記提示：<br>${qData.info}`;
        
        const msgPanel = document.getElementById('message-panel');
        msgPanel.innerHTML = `<div class="msg-content"><strong>${hintText}</strong></div>`;
        msgPanel.className = 'message-panel show msg-hint';
        setTimeout(() => msgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }

    function selectAnswer(selectedIndex, btnElement) {
        if (isWaiting) return;
        isWaiting = true;
        
        const qData = activeQuestions[currentQIndex];
        const isCorrect = currentShuffledOptions[selectedIndex].isCorrect;
        const correctIndex = currentShuffledOptions.findIndex(opt => opt.isCorrect);
        const msgPanel = document.getElementById('message-panel');
        
        document.querySelectorAll('.btn-option').forEach(btn => btn.style.pointerEvents = 'none');
        btnElement.classList.add('option-suspense');
        
        setTimeout(() => {
            btnElement.classList.remove('option-suspense');

            if (isCorrect) {
                btnElement.classList.add('option-correct');
                if (qData.safe) currentSafePrize = qData.prize;
                document.getElementById('progress-fill').style.width = `${((currentQIndex + 1) / activeQuestions.length) * 100}%`;

                const btnText = currentQIndex < activeQuestions.length - 1 ? "下一題 ➔" : "完成挑戰 🏆";
                msgPanel.innerHTML = `
                    <div class="msg-content"><strong>✅ 答對了！</strong><br>${qData.info}</div>
                    <div class="msg-action"><button class="btn-next" onclick="proceedNext()">${btnText}</button></div>
                `;
                msgPanel.className = 'message-panel show msg-correct';
            } else {
                btnElement.classList.add('option-wrong');
                const correctBtn = document.getElementById('opt-btn-' + correctIndex);
                if (correctBtn) correctBtn.classList.add('option-correct');
                
                msgPanel.innerHTML = `
                    <div class="msg-content"><strong>❌ 答錯了！正確答案是 ${labels[correctIndex]}。</strong><br>${qData.info}</div>
                    <div class="msg-action"><button class="btn-next" style="background: linear-gradient(135deg, #EF4444, #DC2626);" onclick="endGame(false)">查看結果</button></div>
                `;
                msgPanel.className = 'message-panel show msg-wrong';
            }
            setTimeout(() => msgPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        }, 1200); 
    }

    function proceedNext() {
        currentQIndex++;
        if (currentQIndex < activeQuestions.length) {
            loadQuestion();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
            endGame(true);
        }
    }

    function endGame(isWin) {
        switchScreen('screen-end');
        const title = document.getElementById('end-title');
        const message = document.getElementById('end-message');
        const iconDiv = document.getElementById('end-icon');
        
        let levelName = "";
        if(currentLevel === 'S1') levelName = "中一級 兩漢歷史";
        else if(currentLevel === 'S2') levelName = "中二級 滿清入關";
        else levelName = "DSE 歷史論述";
        
        if (isWin) {
            iconDiv.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
            iconDiv.style.background = '#ECFDF5'; iconDiv.style.borderColor = '#A7F3D0';
            title.innerText = "🎉 溫習大成功！"; title.style.color = "#065F46";
            message.innerHTML = `太厲害了！你成功突破了所有題目。<br>看來【${levelName}】已經完全難不倒你了！<br><br><span class="font-num" style="display: block; margin-top: 1rem; font-size: 2.5rem; color: #4F46E5; font-weight: 700;">頂級表現</span>`;
        } else {
            iconDiv.innerHTML = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;
            iconDiv.style.background = '#FEF3C7'; iconDiv.style.borderColor = '#FDE68A';
            title.innerText = "挑戰止步"; title.style.color = "#B45309";
            message.innerHTML = `本次挑戰止步於第 ${currentQIndex + 1} 題。<br>你最後獲得的保證分數為：<br><br><span class="font-num" style="display: block; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 2.5rem; color: #1E293B; font-weight: 700;">${currentSafePrize}</span><br>多看幾次剛才的解說後再來挑戰吧！`;
        }
    }
</script>
