                                    <div key={idx} className={rowClass}>
                                        <span className={`w-8 text-left ${textClass}`}>{actualQIndex + 1}</span>
                                        <span className={`flex-1 text-right ${textClass}`}>${prize.toLocaleString()}</span>
                                        {isCurrent && <div className="absolute -left-1.5 w-1.5 h-1/2 bg-amber-400 rounded-full shadow-md top-1/2 -translate-y-1/2"></div>}
                                        {isMilestone && !isPassed && !isCurrent && <div className="absolute left-2 w-1 h-1 bg-slate-300 rounded-full"></div>}
                                    </div>
                                );
                            })}
                        </div>
                        {/* 底部裝飾漸層 */}
                        <div className="absolute bottom-0 left-0 right-0 h-16 bg-gradient-to-t from-white to-transparent pointer-events-none"></div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
